name: Build And Publish Release Assets

on:
  release:
    types: [published]

  # checkov:skip=CKV_GHA_7 This input is required for manual triggering
  workflow_dispatch:
    inputs:
      tag-name:
        type: string
        description: the name of the tag to make
        required: true

permissions: {}

jobs:
  build-windows:
    permissions:
      contents: read
    name: Build Windows Assets
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # was: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # was: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: bun run rebuild:native

      - name: Build app
        run: bun run build

      - name: Build Windows installer artifacts (no publish)
        run: bun x electron-builder --win nsis --publish never

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # was: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error

  publish-windows:
    needs: build-windows
    permissions:
      contents: write
    name: Publish Windows Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # was: actions/download-artifact@v4
        with:
          name: windows-installers
          path: ./release_assets

      - name: Resolve tag and verify release exists
        env:
          GH_TOKEN: ${{ github.token }}
          INPUTS_TAG_NAME: ${{ inputs.tag-name }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${INPUTS_TAG_NAME}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release '$TAG_NAME' does not exist. Aborting upload."
            exit 1
          fi

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload Release Assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ env.TAG_NAME }}
        run: |
          gh release upload "${TAG_NAME}" \
            ./release_assets/*.exe \
            ./release_assets/*.yml \
            ./release_assets/*.blockmap \
            --clobber

name: Build And Publish Release Assets

on:
  release:
    types: [published]

  # checkov:skip=CKV_GHA_7 This input is required for manual triggering
  workflow_dispatch:
    inputs:
      tag-name:
        type: string
        description: the name of the tag to make
        required: true

permissions: {}

jobs:
  build-windows:
    permissions:
      contents: read
    name: Publish Windows Assets
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: bun run rebuild:native

      - name: Build app
        run: bun run build

      - name: Build Windows installer artifacts (no publish)
        run: bun x electron-builder --win nsis --publish never

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error

  publish-windows:
    needs: build-windows
    permissions:
      contents: write
    name: Publish Windows Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: ./release_assets

      - name: Resolve tag and verify release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag-name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release '$TAG_NAME' does not exist. Aborting upload."
            exit 1
          fi

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Upload Release Assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ env.TAG_NAME }}
        run: |
          gh release upload "${{ env.TAG_NAME }}" \
            ./release_assets/*.exe \
            ./release_assets/*.yml \
            ./release_assets/*.blockmap \
            --clobber

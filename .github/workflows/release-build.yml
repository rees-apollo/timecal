name: Build And Publish Release Assets

on:
  release:
    types: [published]

  # checkov:skip=CKV_GHA_7 This input is required for manual triggering
  workflow_dispatch:
    inputs:
      tag-name:
        type: string
        description: the name of the tag to make
        required: true

permissions: {}

jobs:
  publish-windows:
    permissions:
      contents: write
    name: Publish Windows Assets
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: bun run rebuild:native

      - name: Build app
        run: bun run build

      - name: Build Windows installer artifacts (no publish)
        run: bun x electron-builder --win nsis --publish never

      - name: Upload Release Assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "${{ env.TAG_NAME }}" \
          ./dist/*.exe \
          ./dist/*.yml \
          ./dist/*.blockmap
